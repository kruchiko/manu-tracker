name: CI — manu-eye

on:
  push:
    branches: [main]
    paths: [manu-eye/**]
  pull_request:
    branches: [main]
    paths: [manu-eye/**]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manu-eye

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.11"
          enable-cache: true
          cache-dependency-glob: manu-eye/uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version-file: manu-eye/.python-version

      - name: Install system dependencies for pyzbar
        run: sudo apt-get update && sudo apt-get install -y libzbar0

      - run: uv sync

      - run: uv run pytest -v
        env:
          EYE_ID: ci-test-eye
