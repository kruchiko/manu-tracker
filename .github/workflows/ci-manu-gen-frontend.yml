name: CI — manu-gen frontend

on:
  push:
    branches: [main]
    paths: [manu-gen/frontend/**]
  pull_request:
    branches: [main]
    paths: [manu-gen/frontend/**]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manu-gen/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable
      - run: yarn install --immutable

      - run: yarn typecheck
      - run: yarn build
      - run: yarn test
